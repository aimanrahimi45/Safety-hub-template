</style><script type="module">function e(t,o){const n=`/login?error=${encodeURIComponent(o)}`;window.location.replace(n)}e("/login","Supabase is not configured.");
</script></head> <body>  <main class="callback-page" data-astro-cid-qbporkgn> <div class="container" data-astro-cid-qbporkgn> <div class="callback-card" data-astro-cid-qbporkgn> <h1 data-astro-cid-qbporkgn>Signing you in…</h1> <p data-astro-cid-qbporkgn>Completing Google sign-in.</p> </div> </div> </main>  <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.15, rootMargin: '0px 0px -60px 0px' });
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

            // Hero indicator sync (12s cycle, 6s per slide)
            const indicators = document.querySelectorAll('.indicator');
            if (indicators.length === 2) {
                let current = 0;
                setInterval(() => {
                    indicators[current].classList.remove('active');
                    current = (current + 1) % 2;
                    indicators[current].classList.add('active');
                }, 6000);
            }

            // Module tab switching
            const listItems = document.querySelectorAll('.module-list-item');
            const tabs = document.querySelectorAll('.module-tab');
            listItems.forEach(item => {
                item.addEventListener('click', () => {
                    const tab = item.dataset.tab;
                    listItems.forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    tabs.forEach(t => t.classList.remove('active'));
                    const target = document.querySelector('.module-tab[data-tab="' + tab + '"]');
                    if (target) target.classList.add('active');
                });
            });
        });
    </script> </body> </html>
